<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>template sitemap</title>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <style>
      .d-none{
        display:none
      }
      input{
        width: 40px
      }
      html{
        font-family: 微軟正黑體;
        font-size: 0.75rem}
      html,body{
        padding:0;
        margin:0;}
      .sitemap{
        /*position:fixed;*/
        top:10vh;
        left:0;
        z-index:10000;
        background-color: rgba(255,255,255,0.5);
        padding:0px;}
      .sitemap ,a{
        color: rgba(0,0,0,0.5);
        text-decoration:none;}
      /* div{
        font-weight:bold;
        margin-bottom:10px
        }*/
      table{
        border-collapse:collapse;
        vertical-align:top;
      }
      table,th,tr{border: 1px solid}
      tr:hover{background-color:#eee;}
      th{text-align:left}
      td{text-align:center}
      .swal-modal{ width: auto;}
    </style>
  </head>
  <body>
    <h1><a href="http://template.cmind.com.tw/" target="_blank">測試站</a>&nbsp;無痕瀏覽 ctrl + shift + N</h1>
    <label for="defaultBp">所有裝置</label>
    <input id="defaultBp" style="width:14px" type="checkbox">
    <label for="czBp">自訂裝置</label>
    <input id="czBp" style="width:14px" type="checkbox">
    <table class="sitemap">
      <thead>
        <tr>
          <th>page / breakpoint</th>
          <th>new Tab</th>
          <th>clipboard</th>
          <th>all</th>
          <th class="default-dev d-none">360*512</th>
          <th class="default-dev d-none">768*1024</th>
          <th class="default-dev d-none">1024*768</th>
          <th class="default-dev d-none">1366*768</th>
          <th class="cz-dev d-none">
            <select class="bp-select">
              <option value="iphone6/7/8" data-width="375" data-height="667" selected>iphone6/7/8</option>
              <option value="iphone6/7/8+" data-width="414" data-height="736">iphone6/7/8+</option>
              <option value="iphoneX" data-width="375" data-height="812">iphoneX</option>
              <option value="iPadPro" data-width="1024" data-height="1366">iPadPro</option>
              <option value="custom" data-width="" data-height="">Customize</option>
            </select>
            <input class="cz-input cz-width" type="number" placeholder="width" disabled value="375" data-size="width">
            <input class="cz-input cz-height" type="number" placeholder="height" disabled value="667" data-size="height">
          </th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>01 范聖韜教授-個人網站 | 國立臺灣師範大學</th>
          <td><a target="_blank" href="./index.html">auto</a></td>
          <td><a class="anchor clipboard" target="_blank" href="./index.html">copy</a></td>
          <td><a class="anchor all-dev" href="#">all</a></td>
          <td class="default-dev d-none"><a class="anchor phone" href="./index.html">360</a></td>
          <td class="default-dev d-none"><a class="anchor md-h" href="./index.html">768</a></td>
          <td class="default-dev d-none"><a class="anchor md-v" href="./index.html">1024</a></td>
          <td class="default-dev d-none"><a class="anchor pc" href="./index.html">1366</a></td>
          <td class="cz-dev d-none"><a class="anchor for-select" href="./index.html">User Select</a></td>
        </tr>
      </tbody>
      <div><a href="http://127.0.0.1/demo.html" style="color:#aaffaa">Local</a><a href="http://whatlife.no-ip.org/test/template/demo.html" style="color:#ffaaaa">Static</a><a href="http://192.168.0.89/demo.html" style="color:#aaaaff">External</a></div>
      <script>
        let SEL = (selected) => document.querySelector(selected)
        let SELA = (selected) => document.querySelectorAll(selected)
        let browser = { width: '375', height: '668' }
        let breakpoints = [
          { bp: 'phone', name: '360px', cond: 'height=513, width=360' },
          { bp: 'md-h', name: '768px', cond: 'height=1025, width=768, left=410' },
          { bp: 'md-v', name: '1024px', cond: 'height=769, width=1024, left=1228' },
          { bp: 'pc', name: '1366px', cond: 'height=769, width=1366, left=1228, top=1000' }
        ]
        SELA('.anchor').forEach((el) => {
          let bp = el.className.split(' ')[1]
          el.addEventListener('click', function (e) {
            e.preventDefault()
            let breakpoint = breakpoints.find(e => e.bp === bp)
            if (breakpoint) {
              open(e.target.href, breakpoint.name, (config = breakpoint.cond))
            } else if (bp === 'clipboard') {
              let clipboard = document.createElement('textarea')
              clipboard.value = this.href
              document.body.appendChild(clipboard)
              clipboard.select()
              document.execCommand('copy')
              document.body.removeChild(clipboard)
              swal(`已複製超連結，請開啟無痕瀏覽。`, {
                title: this.href,
                icon: 'success',
                buttons: false,
                timer: 3000,
              })
            } else if (bp === 'all-dev') {
              let sib = this.parentNode
              for (let i = 0; i < 4; i++) {
                sib = sib.nextElementSibling
                sib.firstElementChild.click()
              }
            } else if (bp === 'for-select') {
              if (!browser.width) {
                alert('請輸入裝置寬度')
                SEL('.cz-width').focus()
              } else if (!browser.height) {
                alert('請輸入裝置高度')
                SEL('.cz-height').focus()
              } else {
                open(e.target.href, 'custom', (config = 'height=' + browser.height + ', width=' + browser.width))
              }
            }
          })
        })
        SEL('.bp-select').addEventListener('change', function (e) {
          let target = e.target
          SELA('.cz-input').forEach(function (inputbox) {
            inputbox.disabled = target.value !== 'custom'
          })
          let children = [...target.children]
          children.forEach(function (option) {
            if (option.selected) {
              browser = { ...option.dataset }
            }
          })
          for (const key in browser) {
            SEL('.cz-' + key).value = browser[key]
          }
        })
        SELA('.cz-input').forEach(el => {
          el.addEventListener('blur', function (e) {
            let size = e.target.dataset.size
            if (size === 'width') {
              browser.width = e.target.value
            } else if (size === 'height') {
              browser.height = +e.target.value + 1
            }
          })
        })
        SEL('#czBp').addEventListener('change', function (e) {
          SELA('.cz-dev').forEach((el) => {
            el.classList[e.target.checked ? 'remove' : 'add']('d-none')
          })
        })
        SEL('#defaultBp').addEventListener('change', function (e) {
          SELA('.default-dev').forEach((el) => {
            el.classList[e.target.checked ? 'remove' : 'add']('d-none')
          })
        })
        
      </script>
    </table>
  </body>
</html>
